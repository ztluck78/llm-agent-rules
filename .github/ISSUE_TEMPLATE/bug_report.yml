name: Bug report
description: Report a bug or inaccuracy in the evidence-first rule
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form below so we can fix it.
        **Before opening**, please search existing issues to avoid duplicates.

  - type: input
    id: rule-or-doc
    attributes:
      label: Affected file or section
      description: Which file / line / section is wrong?
      placeholder: "e.g. rules/evidence-first-analysis.md, Step 2.2"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of issue is this?
      options:
        - Typo or grammar
        - Broken link
        - Incorrect technical content
        - Rule produces false positives (LLM over-applies)
        - Rule produces false negatives (LLM under-applies)
        - Integration file error (specific tool)
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce the issue? For rule issues, paste the actual LLM output.
      placeholder: |
        1. Ask Claude/Cursor/Trae: "..."
        2. See response: "..."
        3. Expected: "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the correct behavior be?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Tool / version (if applicable)
      description: Which AI tool produced the bug? (Trae / Cursor / Claude Code / Copilot / Aider / Continue / Other)
      placeholder: "e.g. Cursor 1.2.0"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic)
        - Medium (affects usability)
        - High (rule is wrong / harmful)
        - Critical (security / data loss)
    validations:
      required: true
